<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111b2e"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2740"/>
      <stop offset="100%" stop-color="#152037"/>
    </linearGradient>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffd166"/>
    </marker>
  </defs>

  <rect width="1000" height="480" fill="url(#bg3)"/>
  <text x="500" y="40" text-anchor="middle" fill="#e7eefc" font-size="22" font-weight="700">
    Location Fusion Engine
  </text>
  <text x="500" y="64" text-anchor="middle" fill="#8aa0c8" font-size="13">
    GPS · IP · Area Code · User Selection → Confidence-Scored Unified Location
  </text>

  <!-- Inputs -->
  <g font-size="13" fill="#e7eefc">
    <rect x="60" y="120" width="200" height="60" rx="12" fill="url(#card3)" stroke="#2a3a5e"/>
    <text x="160" y="148" text-anchor="middle" fill="#4cc9f0" font-weight="700">GPS</text>
    <text x="160" y="168" text-anchor="middle" fill="#8aa0c8" font-size="11">Weight 1.0 · Highest accuracy</text>

    <rect x="60" y="200" width="200" height="60" rx="12" fill="url(#card3)" stroke="#2a3a5e"/>
    <text x="160" y="228" text-anchor="middle" fill="#90e0ef" font-weight="700">IP Geolocation</text>
    <text x="160" y="248" text-anchor="middle" fill="#8aa0c8" font-size="11">Weight 0.6 · ASN · ISP</text>

    <rect x="60" y="280" width="200" height="60" rx="12" fill="url(#card3)" stroke="#2a3a5e"/>
    <text x="160" y="308" text-anchor="middle" fill="#ffd166" font-weight="700">Area Code</text>
    <text x="160" y="328" text-anchor="middle" fill="#8aa0c8" font-size="11">Weight 0.4 · Region map</text>

    <rect x="60" y="360" width="200" height="60" rx="12" fill="url(#card3)" stroke="#2a3a5e"/>
    <text x="160" y="388" text-anchor="middle" fill="#ef476f" font-weight="700">User Selection</text>
    <text x="160" y="408" text-anchor="middle" fill="#8aa0c8" font-size="11">Weight 0.3 · Country / Region</text>
  </g>

  <!-- Engine -->
  <g>
    <rect x="400" y="200" width="220" height="120" rx="16" fill="url(#card3)" stroke="#2a3a5e"/>
    <text x="510" y="240" text-anchor="middle" fill="#06d6a0" font-weight="700" font-size="15">Fusion Engine</text>
    <text x="510" y="266" text-anchor="middle" fill="#e7eefc" font-size="12">Scores each source</text>
    <text x="510" y="286" text-anchor="middle" fill="#e7eefc" font-size="12">Selects best result</text>
    <text x="510" y="306" text-anchor="middle" fill="#8aa0c8" font-size="11">Outputs unified coords</text>
  </g>

  <!-- Output -->
  <g>
    <rect x="740" y="180" width="220" height="160" rx="16" fill="url(#card3)" stroke="#2a3a5e"/>
    <text x="850" y="215" text-anchor="middle" fill="#06d6a0" font-weight="700" font-size="15">Unified Location</text>
    <text x="850" y="245" text-anchor="middle" fill="#e7eefc" font-size="12">Country · Region · City</text>
    <text x="850" y="267" text-anchor="middle" fill="#e7eefc" font-size="12">Lat / Lon</text>
    <text x="850" y="289" text-anchor="middle" fill="#e7eefc" font-size="12">Confidence %</text>
    <text x="850" y="315" text-anchor="middle" fill="#8aa0c8" font-size="11">Rendered on 2D / 3D Map</text>
  </g>

  <g stroke="#ffd166" stroke-width="2" fill="none" marker-end="url(#arrow3)">
    <path d="M260 150 C 340 150 360 230 400 240"/>
    <path d="M260 230 L 400 250"/>
    <path d="M260 310 L 400 280"/>
    <path d="M260 390 C 340 390 360 320 400 300"/>
    <path d="M620 260 L 740 260"/>
  </g>
</svg>
