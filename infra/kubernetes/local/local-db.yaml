apiVersion: v1
kind: Secret
metadata:
  name: postgres-app
  namespace: database
type: kubernetes.io/basic-auth
stringData:
  username: orca
  password: change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser
  namespace: database
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: change-me
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: database
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  primaryUpdateStrategy: unsupervised
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: orca
      owner: orca
      secret:
        name: postgres-app
  superuserSecret:
    name: postgres-superuser
  monitoring:
    enablePodMonitor: false
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: database
spec:
  type: ExternalName
  externalName: postgres-rw.database.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: database
spec:
  type: ExternalName
  externalName: postgres-rw.database.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: database
spec:
  type: ExternalName
  externalName: postgres-rw.database.svc.cluster.local