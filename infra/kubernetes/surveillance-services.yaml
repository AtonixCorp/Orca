apiVersion: apps/v1
kind: Deployment
metadata:
  name: threat-detection
  namespace: ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: threat-detection
  template:
    metadata:
      labels:
        app: threat-detection
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8023"
    spec:
      nodeSelector:
        smartcito.io/accelerator: gpu-optional
      containers:
        - name: threat-detection
          image: smartcito/threat-detection:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "surveillance.threat_detection_service:app", "--host", "0.0.0.0", "--port", "8023"]
          envFrom:
            - configMapRef:
                name: smartcito-platform-config
          ports:
            - containerPort: 8023
          readinessProbe:
            httpGet:
              path: /ready
              port: 8023
          livenessProbe:
            httpGet:
              path: /health
              port: 8023
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: threat-detection
  namespace: ai
spec:
  selector:
    app: threat-detection
  ports:
    - port: 8023
      targetPort: 8023
  type: ClusterIP
