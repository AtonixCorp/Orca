apiVersion: apps/v1
kind: Deployment
metadata:
  name: drone-gateway
  namespace: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drone-gateway
  template:
    metadata:
      labels:
        app: drone-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8020"
    spec:
      containers:
        - name: drone-gateway
          image: smartcito/drone-gateway:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "surveillance.drone_gateway_service:app", "--host", "0.0.0.0", "--port", "8020"]
          envFrom:
            - configMapRef:
                name: smartcito-platform-config
            - secretRef:
                name: smartcito-platform-secrets
          env:
            - name: DRONE_REGISTRY_ENABLED
              value: "1"
          ports:
            - containerPort: 8020
          readinessProbe:
            httpGet:
              path: /ready
              port: 8020
          livenessProbe:
            httpGet:
              path: /health
              port: 8020
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: drone-gateway
  namespace: backend
spec:
  selector:
    app: drone-gateway
  ports:
    - port: 8020
      targetPort: 8020
  type: ClusterIP
---
