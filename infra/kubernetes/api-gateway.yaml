apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: smartcito/api-gateway:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: security
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000
