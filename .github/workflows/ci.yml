# ============================================================================
# File: .github/workflows/ci.yml
# Purpose:
#   Continuous Integration for SmartCito.
#     - Lints + tests the Python backend.
#     - Lints + builds the React frontend.
#   Triggered on every PR and on pushes to `main`.
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black (check only)
        run: black --check .

      - name: Mypy
        run: mypy app
        continue-on-error: true   # ratchet up to required once codebase grows

      - name: Pytest
        run: pytest

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
